services:
  iweather:
    build:
      context: .
      args:
        VITE_OPEN_METEO_FORECAST_URL: ${VITE_OPEN_METEO_FORECAST_URL:-https://api.open-meteo.com/v1/forecast}
        VITE_OPEN_METEO_GEOCODING_URL: ${VITE_OPEN_METEO_GEOCODING_URL:-https://geocoding-api.open-meteo.com/v1/search}
    image: iweather:local
    ports:
      - "8080:80"
    restart: unless-stopped
